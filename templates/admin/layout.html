<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Affichage SDIS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f4f4f4; color: #1a1a1a; min-height: 100vh;
    }

    nav {
      background: #C0392B; color: #fff;
      padding: .7rem 1.2rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      position: sticky; top: 0; z-index: 100;
    }
    nav .brand {
      display: flex; align-items: center; gap: .6rem;
      font-weight: 700; font-size: 1rem;
    }
    nav img { height: 34px; }
    nav .nav-links { display: flex; gap: .2rem; flex-wrap: wrap; }
    nav a {
      color: rgba(255,255,255,.80); text-decoration: none;
      font-size: .85rem; padding: .35rem .7rem;
      border-radius: 5px; transition: background .15s;
    }
    nav a:hover, nav a.active { background: rgba(255,255,255,.18); color: #fff; }
    nav a.ext { opacity: .7; font-size: .78rem; }

    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem 3rem; }

    .card {
      background: #fff; border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 1rem; font-weight: 700; margin-bottom: 1.2rem;
      padding-bottom: .6rem; border-bottom: 2px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between; gap: .5rem;
    }

    .btn {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .45rem .9rem; border-radius: 6px; border: none;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: opacity .15s, background .15s; white-space: nowrap;
    }
    .btn:hover { opacity: .82; }
    .btn-primary { background: #C0392B; color: #fff; }
    .btn-gray    { background: #e8e8e8; color: #444; }
    .btn-icon    { padding: .38rem .55rem; font-size: .8rem; }
    .btn-danger  { background: #fde8e8; color: #C0392B; }

    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: .3rem; color: #555; }
    input[type=text], input[type=number], textarea {
      width: 100%; padding: .62rem .9rem;
      border: 1.5px solid #ddd; border-radius: 7px;
      font-size: .95rem; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus { border-color: #C0392B; }
    textarea { resize: vertical; min-height: 110px; }
    .hint { font-size: .76rem; color: #aaa; margin-top: .22rem; }

    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th {
      text-align: left; font-size: .75rem; font-weight: 700;
      color: #999; text-transform: uppercase; letter-spacing: .04em;
      padding: .45rem .7rem; border-bottom: 2px solid #f0f0f0;
    }
    td { padding: .6rem .7rem; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.inactive td { opacity: .4; }

    .badge { display: inline-block; padding: .18rem .5rem; border-radius: 20px; font-size: .72rem; font-weight: 700; }
    .badge-on  { background: #e6f9f0; color: #1a7a45; }
    .badge-off { background: #f5f5f5; color: #999; }

    .actions { display: flex; gap: .25rem; flex-wrap: wrap; }

    @media (max-width: 580px) {
      .hide-sm { display: none; }
      td, th { padding: .4rem .35rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="brand">
    <img src="/static/logo-sdis.png" alt="" onerror="this.style.display='none'">
    Affichage SDIS
  </div>
  <div class="nav-links">
    <a href="/admin" {% if request.path == '/admin' %}class="active"{% endif %}>Annonces</a>
    <a href="/admin/ticker" {% if request.path == '/admin/ticker' %}class="active"{% endif %}>Bandeau</a>
    <a href="/admin/settings" {% if request.path == '/admin/settings' %}class="active"{% endif %}>Paramètres</a>
    <a href="/" target="_blank" class="ext">Écran ↗</a>
    <a href="/logout">Déconnexion</a>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

</body>
</html>
