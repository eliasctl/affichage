services:
  affichage:
    build: .
    ports:
      - 8000:8000
    volumes:
      - affichage_uploads:/app/static/uploads
      - affichage_icons:/app/static/icons
      - affichage_videos:/app/static/videos
      - affichage_db:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # Optionnel : si défini, fige le token d'accès écran. Sinon, généré
      # automatiquement au premier démarrage et persisté en base.
      - DISPLAY_TOKEN=${DISPLAY_TOKEN:-}
    restart: unless-stopped

volumes:
  affichage_uploads:
  affichage_icons:
  affichage_videos:
  affichage_db:
